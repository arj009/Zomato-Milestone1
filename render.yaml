services:
  - type: web
    name: zomato-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn phase4.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # You will need to set this in the Render Dashboard
      - key: GROQ_MODEL
        sync: false  # You will need to set this in the Render Dashboard
      - key: ALLOWED_ORIGINS
        value: "*"  # Update this to your Vercel URL after frontend deployment
      - key: PYTHON_VERSION
        value: 3.11
      - key: CATALOG_PATH
        value: data/catalog.jsonl
